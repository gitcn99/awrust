# 开发环境配置示例
# 复制本文件为 config/config.dev.toml 后按需填写真实连接信息。
#
# 每个环境使用独立的完整配置文件，无需基础配置层：
#   config/config.dev.toml      ← 开发环境（debug 编译模式默认 / CC_MODE=dev）
#   config/config.online.toml   ← 线上环境（release 编译模式默认 / CC_MODE=online）
#   config/config.<自定义>.toml ← 任意命名（通过 CC_MODE=<自定义> 切换）

# MySQL
[mysql.default]
host = "127.0.0.1"
port = 3306
user = "your_user"
password = "your_password"
database = "your_db"
# 最大连接数
# max_connections = 10
# SSL 模式：disabled / preferred / required
# ssl_mode = "preferred"
# 禁用 SQL 模式
# disable_sql_mode = false
# 连接超时时间（秒）
# acquire_timeout = 5
# 空闲连接断开时间（秒）
# idle_timeout = 60

# Redis
[redis.default]
url = "redis://:password@127.0.0.1:6379"

# Tracing 日志配置
[tracing]
level = "info"
format = "pretty"
